name: muon
family: muon
hparams:
  lr: 0.02
  weight_decay: 0.01
  mu: 0.95
  nesterov: true
  ns_steps: 12
  adam_lr: 0.001
  adam_betas: [0.9, 0.95]
  adam_eps: 1.0e-8
  adam_weight_decay: 0.01
param_groups:
  matrix: ndim>=2
  aux: ndim<2
metadata:
  description: Matrix-like parameters use Muon; auxiliary parameters use AdamW.
